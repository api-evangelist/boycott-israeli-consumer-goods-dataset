description: >-
  The Boycott Israeli Consumer Goods Dataset, maintained by TechForPalestine, is a
  version-controlled, golden-source repository collating consumer boycott and
  alternative product data into a single consumable dataset. The project aggregates
  data from authoritative sources including the Who Profits Research Center, the BDS
  Movement boycott guide, and the AFSC profiteering company list. Data is stored as
  YAML and exported in CSV and JSON formats for integration into software products
  and services.
